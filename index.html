<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Erman Bağbakan — Apps</title>
<meta name="description" content="iOS apps by Erman Bağbakan: Moonwake, Scanitive, and Limn.">
<style>
:root{--bg:#0e1220;--card:rgba(255,255,255,.05);--line:rgba(255,255,255,.12);
  --ink:#f3f1ec;--dim:#a7abbe;--accent:#e9bf74}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
  background:linear-gradient(180deg,#0e1220 0%,#141a30 100%);color:var(--ink);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 22px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1{font-size:26px;font-weight:700;letter-spacing:.3px}
.sub{color:var(--dim);font-size:15px;margin:4px 0 34px}
.apps{display:flex;flex-direction:column;gap:14px;width:100%;max-width:440px}
.app{display:flex;align-items:center;gap:16px;background:var(--card);
  border:1px solid var(--line);border-radius:18px;padding:18px 20px;
  text-decoration:none;color:var(--ink);transition:background .15s}
.app:hover{background:rgba(255,255,255,.09)}
.app .ic{font-size:28px;width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);flex:none}
.app h2{font-size:17px;font-weight:600}
.app p{font-size:13.5px;color:var(--dim)}
.app .go{margin-left:auto;color:var(--accent);font-size:18px;flex:none}
footer{margin-top:44px;color:var(--dim);font-size:12.5px;text-align:center}
footer a{color:var(--dim)}
</style>
</head>
<body>
<h1>Erman Bağbakan</h1>
<p class="sub">Apps for iPhone and Apple Watch</p>

<nav class="apps">
  <a class="app" href="moonwake-sleeptracker/">
    <span class="ic">🌙</span>
    <span><h2>Moonwake</h2><p>Sleep tracker &amp; smart alarm for iPhone and Apple Watch.</p></span>
    <span class="go">→</span>
  </a>
  <a class="app" href="scanitive-site/">
    <span class="ic">🛡️</span>
    <span><h2>Scanitive</h2><p>Scan food &amp; cosmetic labels, know what's inside.</p></span>
    <span class="go">→</span>
  </a>
  <a class="app" href="limn-game/">
    <span class="ic">🎮</span>
    <span><h2>Limn</h2><p>A little game of light and shadow for iOS.</p></span>
    <span class="go">→</span>
  </a>
</nav>

<footer>
  <p>© 2026 Erman Bağbakan · <a href="app-ads.txt">app-ads.txt</a></p>
</footer>
</body>
</html>
